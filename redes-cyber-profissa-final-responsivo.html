<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundamentos de Redes para Cibersegurança · 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#c8506a;--rose-l:#e87a94;--rose-d:#9e3352;
  --gold:#c9913d;--gold-l:#e8b86d;--gold-p:#f5deb3;
  --cream:#fdf6f0;--paper:#fefaf6;--paper2:#f9f0e8;
  --border:#e8d5c0;--border2:#d4b896;
  --ink:#1a0a06;--ink2:#3d1e10;--ink3:#6b3a20;
  --sb:#120810;--sb2:#2a0f1c;
  --r:8px;--sh:0 4px 24px rgba(45,10,20,.14);--shL:0 10px 48px rgba(45,10,20,.22);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#210812;color:var(--ink);display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:272px;min-width:272px;background:#210812;border-right:1px solid var(--sb2);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid var(--sb2)}
.sb-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.sb-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--rose),var(--gold));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-title{font-family:'Playfair Display',serif;font-size:12.5px;color:var(--gold-l);line-height:1.35}
.sb-sub{font-size:9px;color:#e9b7c5;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.sb-prog{padding:10px 16px;border-bottom:1px solid var(--sb2)}
.sb-prog-row{display:flex;justify-content:space-between;font-size:9px;color:#e9b7c5;margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
.sb-bar-bg{height:3px;background:#2a0f1c;border-radius:99px;overflow:hidden}
.sb-bar-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--gold));border-radius:99px;transition:width .5s}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#3a1020;border-radius:99px}
.sb-sec{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#3a1020;padding:10px 16px 3px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .18s}
.nav-item:hover{background:rgba(200,80,106,.07)}
.nav-item.active{background:rgba(200,80,106,.13);border-left-color:var(--rose)}
.nav-item.locked{opacity:.35;cursor:not-allowed}
.nav-item.done .n-num{background:var(--gold);color:#120810;border-color:var(--gold)}
.n-num{width:20px;height:20px;border-radius:50%;background:#3a1020;border:1px solid #6a2a3f;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#f2c9d4;flex-shrink:0;transition:all .18s}
.nav-item.active .n-num{background:var(--rose);border-color:var(--rose);color:#fff}
.n-title{font-size:10.5px;color:#f1c8d2;line-height:1.35;flex:1}
.nav-item.active .n-title{color:#e0b0c0}
.n-lock{font-size:9px;color:#3a1020}
.n-chk{font-size:9px;color:var(--gold)}

/* MAIN */
#main{flex:1;overflow-y:auto;background:linear-gradient(135deg,#2a0b17,#3a1020 45%,#210812);display:flex;flex-direction:column;align-items:center;padding:26px 18px}
#main::-webkit-scrollbar{width:5px}
#main::-webkit-scrollbar-thumb{background:#3a1020;border-radius:99px}

/* PDF PAGE */
.pdf-page{width:100%;max-width:790px;background:var(--paper);border-radius:2px;box-shadow:var(--shL),0 0 0 1px rgba(200,80,106,.07);margin-bottom:24px;overflow:hidden;position:relative}
.pdf-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(201,145,61,.04),transparent 60%),radial-gradient(ellipse at bottom left,rgba(200,80,106,.04),transparent 60%);pointer-events:none}
.pdf-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 32px;background:linear-gradient(135deg,#2a0e1c,#180810);border-bottom:2px solid var(--gold)}
.pdf-hd-brand{font-family:'Playfair Display',serif;font-size:10px;color:var(--gold-l);letter-spacing:.1em;text-transform:uppercase}
.pdf-hd-ch{font-size:10px;color:#f3d6df;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.pdf-body{padding:40px 48px 32px}
.pdf-ft{display:flex;align-items:center;justify-content:space-between;padding:10px 32px;background:var(--paper2);border-top:1px solid var(--border)}
.pdf-ft-l,.pdf-ft-r{font-size:9px;color:var(--ink3);letter-spacing:.04em}
.pdf-ft-pg{width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--ink3)}

/* TYPOGRAPHY */
.ch-eye{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--rose);font-weight:700;margin-bottom:6px}
.ch-h1{font-family:'Playfair Display',serif;font-size:27px;color:var(--ink);line-height:1.2;margin-bottom:4px}
.ch-sub{font-size:13.5px;color:var(--ink2);margin-bottom:16px}
.ch-div{height:2px;background:linear-gradient(90deg,var(--rose),var(--gold),transparent);margin-bottom:24px;border-radius:1px}
.ch-h2{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink);margin:24px 0 8px;padding-left:10px;border-left:3px solid var(--rose)}
.ch-h3{font-size:12.5px;font-weight:700;color:var(--rose-d);margin:16px 0 6px;letter-spacing:.02em}
.ch-p{font-size:13.5px;color:var(--ink2);line-height:1.82;margin-bottom:12px}
.ch-p strong{color:var(--ink);font-weight:700}
ul.ch-ul{margin:8px 0 12px 18px}
ul.ch-ul li{font-size:13.5px;color:var(--ink2);line-height:1.82}
ul.ch-ul li::marker{color:var(--rose)}
.dom-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:99px;margin-bottom:8px}
.dom-1{background:rgba(200,80,106,.1);color:var(--rose);border:1px solid rgba(200,80,106,.3)}
.dom-2{background:rgba(201,145,61,.1);color:var(--gold);border:1px solid rgba(201,145,61,.3)}
.dom-3{background:rgba(60,100,200,.1);color:#6080e0;border:1px solid rgba(60,100,200,.3)}
.dom-4{background:rgba(40,140,80,.1);color:#40a060;border:1px solid rgba(40,140,80,.3)}
.dom-5{background:rgba(140,60,160,.1);color:#a060c0;border:1px solid rgba(140,60,160,.3)}

/* CALLOUTS */
.box{border-radius:var(--r);padding:12px 16px;margin:14px 0;display:flex;gap:10px;align-items:flex-start}
.box-rose{background:rgba(200,80,106,.08);border:1px solid rgba(200,80,106,.26)}
.box-gold{background:rgba(201,145,61,.08);border:1px solid rgba(201,145,61,.26)}
.box-blue{background:rgba(60,100,200,.08);border:1px solid rgba(60,100,200,.26)}
.box-green{background:rgba(40,140,80,.08);border:1px solid rgba(40,140,80,.26)}
.box-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.box-txt{font-size:13px;color:var(--ink2);line-height:1.72}
.box-txt strong{color:var(--ink);font-weight:700}

/* TABLES */
.ch-tbl{width:100%;border-collapse:collapse;margin:14px 0;font-size:12.5px}
.ch-tbl th{background:linear-gradient(135deg,#2a0e1c,#3a1828);color:var(--gold-l);padding:8px 12px;text-align:left;font-weight:700;letter-spacing:.04em;font-size:11px}
.ch-tbl td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--ink2)}
.ch-tbl tr:nth-child(even) td{background:rgba(200,80,106,.025)}

/* DIAGRAM */
.diagram{background:#fef8f2;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:14px 0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink2);line-height:2}

/* NET NODES */
.net-d{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;padding:14px}
.nn{display:inline-block;padding:6px 13px;border-radius:var(--r);font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.nn-r{background:#2a0e1c;color:var(--gold-l);border:1px solid var(--gold)}
.nn-sw{background:#0e0f28;color:#b0a0f0;border:1px solid #5050b0}
.nn-h{background:#0e2818;color:#80e0a0;border:1px solid #3a7a50}
.nn-fw{background:#2a0a0a;color:var(--rose-l);border:1px solid var(--rose)}
.nn-cl{background:#0a1828;color:#60c0f0;border:1px solid #2060a0}
.nn-at{background:#2a0a0a;color:#ff8090;border:1px solid #cc2040;font-style:italic}
.na{color:var(--ink3);font-size:14px;margin:0 4px}

/* LAB */
.lab{background:linear-gradient(135deg,#fef3f6,#fdf8f0);border:2px solid var(--rose);border-radius:10px;padding:20px;margin:20px 0;position:relative;overflow:hidden}
.lab::before{content:'⚗';position:absolute;right:16px;top:10px;font-size:24px;opacity:.1}
.lab-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.lab-badge{background:linear-gradient(135deg,var(--rose),var(--gold));color:#fff;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.lab-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--ink)}
.lab-desc{font-size:13px;color:var(--ink2);line-height:1.72;margin-bottom:12px}

/* TERMINAL — LETRAS CLARAS sobre fundo escuro */
.term-wrap{background:#080410;border:1px solid #3a1828;border-radius:10px;overflow:hidden;margin:14px 0}
.term-bar{background:#110818;padding:8px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #2a1020}
.td{width:10px;height:10px;border-radius:50%}
.td-r{background:#c8506a}.td-y{background:#c9913d}.td-g{background:#5aad70}
.term-ttl{font-size:10px;color:#f3cbd5;font-family:'JetBrains Mono',monospace;margin-left:4px}
.term-body{padding:13px 17px;min-height:80px;max-height:230px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.8;background:#080410}
/* ── CORES DO TERMINAL — todas claras e legíveis ── */
.t-out{color:#ddc8b8;font-weight:500}         /* output — creme claro */
.t-cmd{color:#f0c060;font-weight:700}          /* comandos — amarelo */
.t-cm {color:#f4b8c8;font-weight:700}          /* comentário — vinho escuro (decorativo) */
.t-ok {color:#7adcaa;font-weight:600}          /* sucesso — verde claro */
.t-err{color:#ff7888;font-weight:600}          /* erro/alerta — rosa claro */
.t-hl {color:#f8e060;font-weight:700}          /* destaque — amarelo brilhante */
.t-info{color:#80c8f0;font-weight:500}         /* info — azul claro */
.term-in-row{display:flex;align-items:center;padding:7px 17px;border-top:1px solid #1a0818;gap:6px;background:#080410}
.t-prompt{color:var(--rose);font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700}
.t-input{flex:1;background:transparent;border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#f0c060;caret-color:var(--rose)}
.t-run{background:linear-gradient(135deg,var(--rose-d),var(--rose));color:#fff;border:none;padding:4px 12px;border-radius:99px;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.04em}

/* QUIZ */
.quiz{background:#fef9fb;border:1px solid var(--border2);border-radius:10px;padding:20px;margin:20px 0}
.quiz-ttl{font-family:'Playfair Display',serif;font-size:16px;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.q-block{margin-bottom:16px}
.q-text{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:8px;line-height:1.6}
.q-opts{display:flex;flex-direction:column;gap:6px}
.q-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--ink2);transition:all .18s;user-select:none}
.q-opt:hover{border-color:var(--rose-l);background:rgba(200,80,106,.04)}
.q-opt.sel{border-color:var(--rose);background:rgba(200,80,106,.07);color:var(--ink)}
.q-opt.right{border-color:#2a8a50;background:rgba(42,138,80,.08);color:#1a5030}
.q-opt.wrong{border-color:#cc2040;background:rgba(204,32,64,.07);color:#7a1020}
.q-lt{width:20px;height:20px;border-radius:50%;background:var(--paper2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:var(--ink3)}
.q-fb{margin-top:8px;padding:8px 12px;border-radius:var(--r);font-size:12.5px;display:none;line-height:1.65}
.q-fb.show{display:block}
.q-fb.ok{background:rgba(42,138,80,.08);color:#1a5030;border:1px solid rgba(42,138,80,.3)}
.q-fb.fail{background:rgba(204,32,64,.07);color:#7a1020;border:1px solid rgba(204,32,64,.3)}
.q-sub{margin-top:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.q-score-txt{font-size:12.5px;color:var(--ink3)}
.q-btn{background:linear-gradient(135deg,var(--rose),var(--rose-d));color:#fff;border:none;padding:8px 20px;border-radius:99px;font-size:12.5px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:all .18s}
.q-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,80,106,.3)}
.q-btn:disabled{opacity:.45;cursor:default;transform:none}

/* ATK callout */
.atk{background:#fef3f3;border:2px solid rgba(200,80,106,.3);border-radius:10px;padding:16px;margin:14px 0}
.atk-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.atk-badge{background:var(--rose);color:#fff;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.atk-title{font-family:'Playfair Display',serif;font-size:14px;color:var(--ink)}

/* CODE */
.code{background:#0a0614;border:1px solid #2a1020;border-radius:var(--r);padding:13px 16px;margin:12px 0;overflow-x:auto}
.code-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--rose);margin-bottom:6px;font-weight:700}
.code pre{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#ddc8b8;line-height:1.72}
.code .kw{color:var(--gold-l)}.code .st{color:#a0e0b0}.code .cm{color:#5a2838}.code .nm{color:var(--rose-l)}

/* INTERACTIVE */
.osi-row{display:flex;align-items:center;gap:12px;padding:8px 14px;border-radius:var(--r);margin-bottom:4px;cursor:pointer;border:1.5px solid transparent;transition:all .18s}
.osi-row:hover{border-color:var(--rose-l)}
.osi-row.open{border-color:var(--rose);background:rgba(200,80,106,.05)}
.osi-n{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:12px;font-weight:700;flex-shrink:0}
.osi-inf strong{display:block;font-size:12.5px;color:var(--ink)}
.osi-inf span{font-size:11.5px;color:var(--ink3)}
.osi-det{display:none;padding:10px 14px;background:rgba(200,80,106,.04);border-left:3px solid var(--rose);margin:-2px 0 6px 44px;border-radius:0 var(--r) var(--r) 0;font-size:12.5px;color:var(--ink2);line-height:1.72}
.osi-det.show{display:block}
.ports-g{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:12px 0}
.port-c{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:all .18s;text-align:center}
.port-c:hover{border-color:var(--rose-l);transform:translateY(-1px);box-shadow:0 3px 10px rgba(200,80,106,.1)}
.port-n{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--rose)}
.port-nm{font-size:11.5px;font-weight:700;color:var(--ink);margin:2px 0}
.port-d{font-size:10px;color:var(--ink3)}
#port-detail{display:none;margin-top:9px;padding:12px 15px;background:rgba(200,80,106,.06);border:1px solid rgba(200,80,106,.24);border-radius:var(--r);font-size:13px;color:var(--ink2);line-height:1.7}
.band-viz{display:flex;gap:9px;margin:12px 0;flex-wrap:wrap}
.band-card{flex:1;min-width:130px;background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .18s;text-align:center}
.band-card:hover,.band-card.sel{border-color:var(--rose);background:rgba(200,80,106,.05)}
.band-freq{font-family:'Playfair Display',serif;font-size:20px;color:var(--rose);font-weight:700}
.band-label{font-size:11px;font-weight:700;color:var(--ink);margin:2px 0}
.band-desc{font-size:11px;color:var(--ink3)}
#band-detail{display:none;margin-top:9px;padding:12px 15px;background:rgba(200,80,106,.06);border:1px solid rgba(200,80,106,.24);border-radius:var(--r);font-size:13px;color:var(--ink2);line-height:1.7}
.cable-row{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}
.cable-c{flex:1;min-width:110px;background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:11px;cursor:pointer;transition:all .18s;text-align:center}
.cable-c:hover,.cable-c.sel{border-color:var(--gold);background:rgba(201,145,61,.05)}
.cable-cat{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);font-weight:700}
.cable-spd{font-size:11px;font-weight:700;color:var(--ink);margin:2px 0}
.cable-note{font-size:10px;color:var(--ink3)}
#cable-detail{display:none;margin-top:9px;padding:12px 15px;background:rgba(201,145,61,.06);border:1px solid rgba(201,145,61,.24);border-radius:var(--r);font-size:13px;color:var(--ink2);line-height:1.7}
.sub-calc{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;margin:14px 0}
.sub-row{display:flex;gap:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.sub-lbl{font-size:13px;font-weight:600;color:var(--ink2);min-width:110px}
.sub-inp{font-family:'JetBrains Mono',monospace;font-size:13px;padding:6px 12px;border:1.5px solid var(--border);border-radius:var(--r);color:var(--ink);background:var(--paper2);outline:none;width:170px}
.sub-inp:focus{border-color:var(--rose)}
.sub-res{background:#080410;border-radius:var(--r);padding:12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:2;display:none;color:#ddc8b8}
.sub-res.show{display:block}
.sr-k{color:var(--gold-l)}.sr-v{color:#80e0b0}
.calc-btn{background:linear-gradient(135deg,var(--rose-d),var(--rose));color:#fff;border:none;padding:7px 18px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer}
.trbl-step{display:flex;gap:11px;margin-bottom:9px;align-items:flex-start}
.trbl-n{width:25px;height:25px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--gold));color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.trbl-txt{font-size:13.5px;color:var(--ink2);line-height:1.72;padding-top:3px}
.trbl-txt strong{color:var(--ink)}

/* NAV BAR */
.ch-nav{width:100%;max-width:790px;display:flex;justify-content:space-between;align-items:center;padding:0 0 16px}
.nav-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:99px;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .18s;border:1.5px solid transparent;letter-spacing:.02em}
.nav-btn.pri{background:linear-gradient(135deg,var(--rose),var(--gold));color:#fff}
.nav-btn.pri:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(200,80,106,.35)}
.nav-btn.sec{border-color:#3a1828;color:#7a4050;background:transparent}
.nav-btn.sec:hover{border-color:var(--rose);color:var(--rose-l)}

/* WELCOME */
#welcome-view{display:flex;flex-direction:column;align-items:center;width:100%;max-width:790px}
.wlc-page{width:100%;background:var(--paper);border-radius:2px;box-shadow:var(--shL);overflow:hidden}
.wlc-hero{background:linear-gradient(135deg,#2a0e1c,#180810,#0d0508);padding:52px 48px 44px;position:relative;overflow:hidden}
.wlc-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:280px;height:280px;background:radial-gradient(circle,rgba(201,145,61,.13),transparent 70%);pointer-events:none}

<script>
/* ══ Camada simples de ofuscação local: índices e comentários do quiz não ficam legíveis no código-fonte. ══ */
const BK=0x4E;
function enc(a,qi,ci){const s=((qi*7+ci*13)&0xFF),k=BK^s,v=a^k,b=new Uint8Array([s,v]);return btoa(String.fromCharCode(...b))}
function dec(e){const r=atob(e),s=r.charCodeAt(0),v=r.charCodeAt(1);return v^(BK^s)}
function decS(e,qi,ci){
  const raw=atob(e),s=raw.charCodeAt(0),k=(BK^s^((qi+17)&0xFF)^((ci+31)&0xFF));
  const bytes=Uint8Array.from(raw.slice(1),ch=>ch.charCodeAt(0)^k);
  return new TextDecoder().decode(bytes);
}

/* ══ STATE ══ */
const ST={cur:-1,done:JSON.parse(localStorage.getItem('rn_d')||'[]'),scores:JSON.parse(localStorage.getItem('rn_s')||'{}')};
function save(){localStorage.setItem('rn_d',JSON.stringify(ST.done));localStorage.setItem('rn_s',JSON.stringify(ST.scores))}

/* ══ CHAPTERS ══ */
const CHS=[
  {id:0,title:'Modelos OSI e TCP/IP',sub:'Encapsulamento e 3-Way Handshake',dom:1,min:3,fn:ch0},
  {id:1,title:'Endereçamento IP e Subnetting',sub:'IPv4, IPv6, CIDR, VLSM, NAT/PAT',dom:1,min:3,fn:ch1},
  {id:2,title:'Protocolos e Serviços',sub:'DNS, DHCP, NTP, SMTP, SNMP, Syslog',dom:1,min:3,fn:ch2},
  {id:3,title:'Switching e VLANs',sub:'MAC table, 802.1Q, STP, LACP',dom:2,min:3,fn:ch3},
  {id:4,title:'Roteamento',sub:'Estático, OSPF, BGP conceitual',dom:2,min:3,fn:ch4},
  {id:5,title:'Cabeamento e Conectores',sub:'Cat6A, fibra, PoE, SFP, RJ-45',dom:2,min:3,fn:ch5},
  {id:6,title:'Wireless (WLAN)',sub:'802.11ax, WPA3, canais, site survey',dom:2,min:3,fn:ch6},
  {id:7,title:'WAN, VPN e Acesso Remoto',sub:'SD-WAN, MPLS, IPSec, WireGuard',dom:2,min:3,fn:ch7},
  {id:8,title:'Operações e Documentação',sub:'IPAM, diagramas, monitoramento, ITIL',dom:3,min:3,fn:ch8},
  {id:9,title:'Segurança em Camadas',sub:'Firewalls, IDS/IPS, DMZ, Zero Trust',dom:4,min:3,fn:ch9},
  {id:10,title:'Ataques e Ameaças em Redes',sub:'MITM, DoS, scanning, spoofing',dom:4,min:3,fn:ch10},
  {id:11,title:'Análise de Tráfego e Forense',sub:'Wireshark, Zeek, NetFlow, IoCs',dom:4,min:3,fn:ch11},
  {id:12,title:'Troubleshooting Sistematizado',sub:'7 passos de diagnóstico ',dom:5,min:3,fn:ch12},
];
const DN={1:'Dom 1 · Fundamentos',2:'Dom 2 · Implementação',3:'Dom 3 · Operações',4:'Dom 4 · Segurança',5:'Dom 5 · Troubleshooting'};
const DW={1:'23%',2:'20%',3:'18%',4:'22%',5:'17%'};

/* ══ PAGE BUILDER ══ */
function mkPage(hdR,pg,body){
  const d=document.createElement('div');
  d.className='pdf-page';
  d.innerHTML=`<div class="pdf-hd"><span class="pdf-hd-brand">Redes para Cibersegurança · 2026</span><span class="pdf-hd-ch">${hdR}</span></div><div class="pdf-body">${body}</div><div class="pdf-ft"><span class="pdf-ft-l">🛡 Redes para Cibersegurança · 2026</span><div class="pdf-ft-pg">${pg}</div><span class="pdf-ft-r">© 2026</span></div>`;
  return d;
}

/* ══ QUIZ BUILDER · CTF MODE ══ */
const QA={},QS={},QMAP={},QSEC={};
const _ss=(()=>{let v=sessionStorage.getItem('rn_sx');if(!v){v=(crypto.getRandomValues(new Uint32Array(2))[0].toString(36)+Date.now().toString(36));sessionStorage.setItem('rn_sx',v)}return v})();
function _h(x){let h=2166136261;for(let i=0;i<x.length;i++){h^=x.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function _r(ci,qi,n){let x=_h(_ss+'|'+ci+'|'+qi+'|'+n);x^=x<<13;x^=x>>>17;x^=x<<5;return (x>>>0)}
function _rv(s){return String(s).split('').reverse().join('')}
function _esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function mkQuiz(ci,qs){
  QMAP[ci]={};QSEC[ci]={};
  const h=qs.map((q,qi)=>{
    QSEC[ci][qi]={a:_rv(q._2),x:_rv(q._3)};
    const arr=q._1.map((v,i)=>({v,i}));
    for(let n=arr.length-1;n>0;n--){const j=_r(ci,qi,n)%(n+1);[arr[n],arr[j]]=[arr[j],arr[n]]}
    QMAP[ci][qi]=arr.map(x=>x.i);
    return`<div class="q-block" id="qb-${ci}-${qi}"><div class="q-text">${qi+1}. ${_esc(q._0)}</div><div class="q-opts">${arr.map((o,di)=>`<div class="q-opt" id="qo-${ci}-${qi}-${di}" onclick="selQ(${ci},${qi},${di})"><div class="q-lt">${'ABCD'[di]}</div>${_esc(o.v)}</div>`).join('')}</div><div class="q-fb" id="qfb-${ci}-${qi}"></div></div>`;
  }).join('');
  return`<div class="quiz" id="quiz-${ci}"><div class="quiz-ttl">📝 Quiz — ${CHS[ci].title}</div>${h}<div class="q-sub"><span class="q-score-txt" id="qsc-${ci}"></span><button class="q-btn" id="qbtn-${ci}" onclick="subQ(${ci},${qs.length})" disabled>Verificar</button></div></div>`;
}
function selQ(ci,qi,di){
  if(QS[ci]!==undefined)return;
  if(!QA[ci])QA[ci]={};
  const oi=(QMAP[ci]&&QMAP[ci][qi])?QMAP[ci][qi][di]:di;
  QA[ci][qi]={di,oi};
  document.querySelectorAll(`[id^="qo-${ci}-${qi}-"]`).forEach(e=>e.classList.remove('sel'));
  document.getElementById(`qo-${ci}-${qi}-${di}`)?.classList.add('sel');
  const tot=document.querySelectorAll(`[id^="qb-${ci}-"]`).length;
  if(Object.keys(QA[ci]).length>=tot)document.getElementById(`qbtn-${ci}`).disabled=false;
}
function subQ(ci,tot){
  if(QS[ci]!==undefined)return;
  const ans=QA[ci]||{};let sc=0;
  for(let qi=0;qi<tot;qi++){
    const a=ans[qi], sec=QSEC[ci]&&QSEC[ci][qi];if(!a||!sec)continue;
    const cor=dec(sec.a),ok=a.oi===cor;if(ok)sc++;
    const exp=decS(sec.x,qi,ci);
    for(let di=0;di<4;di++){const el=document.getElementById(`qo-${ci}-${qi}-${di}`);if(!el)continue;const orig=(QMAP[ci]&&QMAP[ci][qi])?QMAP[ci][qi][di]:di;if(orig===cor)el.classList.add('right');else if(di===a.di&&!ok)el.classList.add('wrong');el.style.pointerEvents='none';}
    const fb=document.getElementById(`qfb-${ci}-${qi}`);
    if(fb){fb.className=`q-fb show ${ok?'ok':'fail'}`;fb.innerHTML=(ok?'✅ Correto! ':'❌ Incorreto. ')+_esc(exp);}
  }
  QS[ci]=sc;
  const scEl=document.getElementById(`qsc-${ci}`);if(scEl)scEl.textContent=`Pontuação: ${sc}/${tot}`;
  document.getElementById(`qbtn-${ci}`)?.setAttribute('disabled','');
  if(sc>=CHS[ci].min){if(!ST.done.includes(ci))ST.done.push(ci);ST.scores[ci]=sc;save();renderNav();setTimeout(()=>passBanner(ci,sc,tot),350);}

const TCMDS={};
function mkTerm(id,init,cmds){
  TCMDS[id]=cmds;
  return`<div class="term-wrap"><div class="term-bar"><div class="td td-r"></div><div class="td td-y"></div><div class="td td-g"></div><span class="term-ttl">terminal · ${id}</span></div><div class="term-body" id="tb-${id}">${init.map(l=>`<div class="${l.c}">${l.t}</div>`).join('')}</div><div class="term-in-row"><span class="t-prompt">$ </span><input class="t-input" id="ti-${id}" placeholder="comando..." onkeydown="if(event.key==='Enter')runT('${id}')"><button class="t-run" onclick="runT('${id}')">↵</button></div></div>`;
}
function runT(id){
  const inp=document.getElementById(`ti-${id}`),body=document.getElementById(`tb-${id}`);
  if(!inp||!body)return;
  const cmd=inp.value.trim().toLowerCase();if(!cmd)return;
  const l=document.createElement('div');l.innerHTML=`<span class="t-cmd">$ ${inp.value.trim()}</span>`;body.appendChild(l);
  const cmds=TCMDS[id]||{},res=document.createElement('div');
  if(cmds[cmd]){res.innerHTML=cmds[cmd]();res.className='t-out';}
  else{res.innerHTML=`<span class="t-err">Comando não reconhecido: ${cmd}. Digite 'help'</span>`;}
  body.appendChild(res);body.scrollTop=body.scrollHeight;inp.value='';
}

<div class="diagram">Frame chega na porta 1 (src: aa:bb:cc:11:22:33)<br>Switch: <strong>aprende</strong> MAC → porta 1 na CAM table<br>dst: ff:ff:ff:ff:ff:ff (broadcast) → <strong>flood</strong> para todas as portas<br>dst: aa:bb:cc:44:55:66 (conhecido) → <strong>unicast</strong> apenas porta 3<br><span style="font-size:11px;color:#8a6848">MAC desconhecido = flood | MAC conhecido = unicast direto</span></div>
<div class="atk"><div class="atk-hd"><span class="atk-badge">⚠ Ataque</span><span class="atk-title">MAC Flooding — Transformando Switch em Hub</span></div>
<p class="ch-p" style="margin:0">Atacante envia milhares de frames com MACs falsos → CAM table transborda → switch faz flood de tudo → sniffing total. Mitigação: <strong>Port Security</strong> (limitar MACs por porta).</p></div>
<h2 class="ch-h2">VLANs — 802.1Q</h2>
<table class="ch-tbl"><thead><tr><th>Conceito</th><th>Descrição</th><th>Segurança</th></tr></thead><tbody>
<tr><td>Access port</td><td>Conectada a host — sem tag</td><td>Associe à VLAN correta</td></tr>

<tr><td>Native VLAN</td><td>VLAN padrão sem tag em trunk</td><td>Mude de VLAN 1 — vetor de hopping!</td></tr>
<tr><td>VLAN 1</td><td>Default de fábrica</td><td>⛔ Nunca usar em produção</td></tr></tbody></table>
<div class="atk"><div class="atk-hd"><span class="atk-badge">⚠ Ataque</span><span class="atk-title">VLAN Hopping — Double Tagging</span></div>
<p class="ch-p" style="margin:0">Atacante envia frame com duas tags 802.1Q. Primeiro switch remove tag externa (native VLAN); segundo switch entrega na VLAN alvo. Mitigação: alterar Native VLAN para VLAN não utilizada (ex: 999) e desabilitar DTP.</p></div>

<div class="dom-badge dom-4">Domínio 4 · Segurança</div>
<div class="ch-eye">Capítulo 11</div><h1 class="ch-h1">Ataques e Ameaças em Redes</h1>

<div class="box box-rose"><div class="box-icon">⚖️</div><div class="box-txt"><strong>Ética:</strong> Conteúdo educacional para defesa. Nunca teste técnicas sem autorização explícita por escrito.</div></div>
<h2 class="ch-h2">ARP Poisoning / MITM</h2>
<div class="diagram">Normal: <strong style="color:#3a8a5a">Vítima</strong> ←→ <strong style="color:#2a6aaa">Gateway</strong><br>Após ARP Poisoning:<br><strong style="color:#3a8a5a">Vítima</strong> → <strong style="color:#c8506a">Atacante (MITM)</strong> → <strong style="color:#2a6aaa">Gateway</strong><br><span style="font-size:11px;color:#8a6848">Atacante vê e pode modificar TODO o tráfego</span></div>
<p class="ch-p">Mitigações: <strong>Dynamic ARP Inspection (DAI)</strong> em switches, arpwatch, entradas ARP estáticas em hosts críticos.</p>
<h2 class="ch-h2">DoS e DDoS</h2>
<table class="ch-tbl"><thead><tr><th>Ataque</th><th>Mecanismo</th><th>Mitigação</th></tr></thead><tbody>
<tr><td>SYN Flood</td><td>Milhares de SYN sem ACK</td><td>SYN cookies, rate limiting</td></tr>
<tr><td>UDP Flood</td><td>UDP em portas aleatórias</td><td>Rate limit UDP</td></tr>

function togOsi(n){
  const d=document.getElementById(`od-${n}`);const row=d?.previousElementSibling;if(!d)return;
  const open=d.classList.contains('show');
  document.querySelectorAll('.osi-det').forEach(x=>x.classList.remove('show'));
  document.querySelectorAll('.osi-row').forEach(x=>x.classList.remove('open'));
  if(!open){d.classList.add('show');row?.classList.add('open');}
}
function calcSub(){
  const ip=(document.getElementById('sub-ip')?.value||'').trim();
  const cidr=parseInt(document.getElementById('sub-cidr')?.value)||24;
  const res=document.getElementById('sub-res');if(!res)return;
  if(cidr<0||cidr>32){res.innerHTML='<span style="color:#c8506a">Prefixo inválido</span>';res.className='sub-res show';return;}
  const p=ip.split('.').map(Number);
  if(p.length!==4||p.some(x=>isNaN(x)||x<0||x>255)){res.innerHTML='<span style="color:#c8506a">IP inválido</span>';res.className='sub-res show';return;}
  const ipN=(p[0]<<24|p[1]<<16|p[2]<<8|p[3])>>>0;
  const mN=cidr===0?0:(~0<<(32-cidr))>>>0;
  const nN=(ipN&mN)>>>0,bN=(nN|(~mN>>>0))>>>0;
  const h=cidr>=31?(cidr===32?1:2):Math.pow(2,32-cidr)-2;
  const f=n=>[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');
  const fm=m=>[(m>>>24)&255,(m>>>16)&255,(m>>>8)&255,m&255].join('.');
  res.className='sub-res show';
  res.innerHTML=`<span class="sr-k">Rede:          </span><span class="sr-v">${f(nN)}/${cidr}</span>
<span class="sr-k">Máscara:       </span><span class="sr-v">${fm(mN)}</span>
<span class="sr-k">Primeiro host: </span><span class="sr-v">${f(nN+1)}</span>
<span class="sr-k">Último host:   </span><span class="sr-v">${f(bN-1)}</span>
<span class="sr-k">Broadcast:     </span><span class="sr-v">${f(bN)}</span>
<span class="sr-k">Hosts úteis:   </span><span class="sr-v">${h.toLocaleString('pt-BR')}</span>`;
}
function showPort(p,n,d,sec){const b=document.getElementById('port-detail');if(!b)return;b.style.display='block';b.innerHTML=`<strong style="color:var(--rose)">Porta ${p} — ${n}</strong><br>${d}<br><span style="color:#7a1020">⚠ Segurança: ${sec}</span>`;}
function showBand(f,det){const b=document.getElementById('band-detail');if(!b)return;b.style.display='block';b.innerHTML=`<strong style="color:var(--rose)">${f}</strong> — ${det}`;document.querySelectorAll('.band-card').forEach(c=>{c.classList.remove('sel');if(c.querySelector('.band-freq')?.textContent===f)c.classList.add('sel');});}
function showCable(cat,det){const b=document.getElementById('cable-detail');if(!b)return;b.style.display='block';b.innerHTML=`<strong style="color:var(--gold)">${cat}</strong> — ${det}`;document.querySelectorAll('.cable-c').forEach(c=>{c.classList.remove('sel');if(c.querySelector('.cable-cat')?.textContent===cat)c.classList.add('sel');});}


/* ══ DEEP DIDACTIC PAGES · adicionadas sem quebrar os labs existentes ══ */
const DEEP=[
{t:'Antes de culpar o firewall: camadas e evidência',p:`<p class="ch-p">O modelo OSI não existe para decorar número de camada e ganhar estrelinha imaginária. Ele existe para impedir que você investigue um problema de DNS olhando cabo, ou culpe o roteador por uma sessão TCP que nem fechou handshake. Em segurança, isso muda tudo: cada ataque deixa evidência em uma camada diferente.</p><p class="ch-p">No lab deste capítulo, quando você executa <strong>netstat</strong>, <strong>handshake</strong>, <strong>flags</strong> e <strong>encap</strong>, você está treinando o caminho mental correto: identificar estado da sessão, camada afetada, protocolo envolvido e possível abuso. É assim que se separa pane real de teatro de alerta.</p><div class="deep-grid"><div class="deep-card"><strong>Erro comum</strong><span>Ver porta aberta e concluir “vulnerável”. Porta aberta é contexto, não sentença judicial.</span></div><div class="deep-card"><strong>Raciocínio correto</strong><span>Serviço, exposição, origem, destino, estado TCP, política esperada e evidência de abuso.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> Muitas conexões SYN para 443, sem ACK final.<br><span class="bad">chute ruim:</span> “HTTPS caiu”.<br><span class="ok">análise boa:</span> possível SYN flood, scan half-open ou filtragem interferindo no handshake.</div>`},
{t:'Subnetting sem drama: segmentar é conter incêndio',p:`<p class="ch-p">Endereço IP não é só número bonitinho para colocar na planilha. Ele define alcance, roteamento, broadcast, segmentação e, principalmente, o tamanho do estrago quando alguém compromete uma máquina. Uma rede /16 plana é basicamente um condomínio sem porta, sem síndico e com o invasor usando crachá.</p><p class="ch-p">A calculadora de sub-rede do lab serve para treinar leitura de rede, broadcast, hosts úteis e máscara. Isso aparece na prática quando você precisa separar usuários, servidores, câmeras, VoIP, convidados, gerenciamento e laboratório. Misturar tudo é confortável até o primeiro malware descobrir que lateral movement também gosta de preguiça arquitetural.</p><div class="deep-grid"><div class="deep-card"><strong>Na defesa</strong><span>Sub-redes menores reduzem broadcast, melhoram controle e permitem ACLs mais claras.</span></div><div class="deep-card"><strong>No ataque</strong><span>Faixas mal segmentadas facilitam varredura, enumeração e movimento lateral.</span></div></div><div class="deep-scenario"><span class="warn">lab:</span> Calcule /26 e observe hosts úteis.<br><span class="ok">interpretação:</span> 62 hosts por segmento, bom para departamentos pequenos.<br><span class="bad">cilada:</span> colocar servidor crítico junto com estação de usuário porque “estava sobrando IP”.</div>`},
{t:'Protocolos: onde o básico vira exfiltração elegante',p:`<p class="ch-p">DNS, DHCP, NTP, SMTP, SNMP e Syslog parecem serviços de infraestrutura, mas são também a avenida por onde muito incidente desfila usando roupa social. DNS pode virar túnel, SNMP mal configurado entrega inventário, NTP pode amplificar ataque e Syslog mal desenhado vira buraco negro de evidência.</p><p class="ch-p">Nos labs de protocolo, o objetivo não é decorar porta como papagaio corporativo. É entender comportamento esperado. DNS em alto volume para domínios estranhos, DHCP oferecendo gateway indevido, SNMP public exposto e NTP sem controle contam histórias. E geralmente são histórias com final ruim.</p><div class="deep-grid"><div class="deep-card"><strong>DNS</strong><span>Resolve nomes, mas também pode carregar beacon, DGA e exfiltração por subdomínios.</span></div><div class="deep-card"><strong>SNMP/Syslog</strong><span>Visibilidade maravilhosa quando bem configurada; vazamento e ruído quando largada no quintal.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> host interno consulta 200 subdomínios aleatórios por minuto.<br><span class="bad">chute ruim:</span> “internet lenta”.<br><span class="ok">análise boa:</span> possível DGA, tunelamento DNS ou beacon de malware.</div>`},
{t:'Switching e VLANs: a camada 2 também sabe destruir seu dia',p:`<p class="ch-p">Switch não é régua de tomada com autoestima. Ele aprende MAC, encaminha quadros, separa domínios e, quando mal configurado, permite que uma VLAN converse com quem não deveria. Camada 2 costuma ser negligenciada porque “não roteia”. Ótimo. O atacante agradece a ingenuidade.</p><p class="ch-p">Os labs deste capítulo simulam MAC table, trunks, VLANs e STP. A pergunta central é: quem deveria falar com quem? Se uma estação de usuário enxerga rede de gerência, se trunk aceita VLAN demais ou se porta de acesso negocia trunk, você não tem rede: tem um buffet livre.</p><div class="deep-grid"><div class="deep-card"><strong>Defesa</strong><span>Port security, BPDU Guard, DHCP Snooping, Dynamic ARP Inspection e trunks restritos.</span></div><div class="deep-card"><strong>Ataque</strong><span>MAC flooding, ARP spoofing, VLAN hopping e abuso de trunk mal definido.</span></div></div><div class="deep-scenario"><span class="warn">lab:</span> porta de usuário aparece como trunk.<br><span class="bad">impacto:</span> possibilidade de VLAN hopping.<br><span class="ok">correção:</span> access mode explícito, allowed VLAN mínimo e DTP desabilitado quando aplicável.</div>`},
{t:'Roteamento: o caminho importa tanto quanto o destino',p:`<p class="ch-p">Roteamento responde uma pergunta simples: para onde mando esse pacote? O problema é que ambiente real responde com tabela mal documentada, rota estática esquecida, métrica esquisita e alguém dizendo “sempre foi assim”. Em segurança, rota define alcance, inspeção, caminho de saída e ponto de coleta de evidência.</p><p class="ch-p">Quando o lab mostra rotas, gateway, OSPF ou BGP conceitual, pense em decisão. O pacote sai pela VPN? passa pelo firewall? contorna inspeção? cai em rota padrão? Uma rota errada pode ser só indisponibilidade. Ou pode ser bypass lindo para quem não deveria sair.</p><div class="deep-grid"><div class="deep-card"><strong>Erro comum</strong><span>Olhar ACL antes de verificar se o tráfego passa mesmo por aquele equipamento.</span></div><div class="deep-card"><strong>Boa prática</strong><span>Validar tabela, métrica, next-hop, assimetria e retorno antes de culpar aplicação.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> ida passa pelo firewall, volta por outro caminho.<br><span class="bad">sintoma:</span> sessão quebra, log fica incompleto.<br><span class="ok">análise:</span> roteamento assimétrico impactando inspeção stateful.</div>`},
{t:'Cabeamento: a parte física também humilha especialista',p:`<p class="ch-p">Nada devolve a humildade como perder duas horas em política de firewall e descobrir que era cabo ruim. Camada física parece básica até virar intermitência, perda, negociação errada, PoE insuficiente ou fibra invertida. E claro: sempre acontece quando alguém importante está olhando.</p><p class="ch-p">Os labs de cabeamento treinam escolha de mídia, conector, distância, velocidade e energia. Segurança também passa por físico: porta exposta, rack sem controle, tap indevido e switch debaixo da mesa são incidentes esperando crachá.</p><div class="deep-grid"><div class="deep-card"><strong>Cobre</strong><span>Cat6/Cat6A, distância, interferência, negociação e PoE precisam casar com o uso.</span></div><div class="deep-card"><strong>Fibra</strong><span>Ótima para backbone, distância e imunidade EMI; péssima para quem acha que conector é detalhe.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> link 1Gbps negocia 100Mbps.<br><span class="bad">chute ruim:</span> “switch velho”.<br><span class="ok">análise boa:</span> cabo, par rompido, auto-negociação, interface ou patch panel.</div>`},
{t:'Wireless: a rede que atravessa parede e governança',p:`<p class="ch-p">Wi‑Fi é maravilhoso porque conecta todo mundo. Também é horrível pelo mesmo motivo. Diferente do cabo, o meio físico está no ar, educadamente disponível para vizinho, visitante, atacante no estacionamento e aquele IoT que ninguém sabe quem comprou.</p><p class="ch-p">Nos labs de WLAN, preste atenção em canal, banda, segurança, roaming e autenticação. WPA3 ajuda, mas não salva arquitetura ruim. Rede guest misturada com produção continua sendo tragédia com SSID bonitinho.</p><div class="deep-grid"><div class="deep-card"><strong>Projeto</strong><span>2.4 GHz alcança mais e sofre mais; 5/6 GHz entregam desempenho melhor com planejamento.</span></div><div class="deep-card"><strong>Segurança</strong><span>802.1X, segmentação, isolamento de cliente e captive portal não são enfeite.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> SSID guest acessa impressora interna.<br><span class="bad">impacto:</span> segmentação decorativa.<br><span class="ok">correção:</span> VLAN guest isolada, ACL restritiva e saída controlada.</div>`},
{t:'WAN e VPN: confiança remota não é passe livre',p:`<p class="ch-p">VPN não é portal mágico de segurança. Ela cria conectividade. Segurança depende de autenticação, criptografia, postura do endpoint, segmentação e política. Se a VPN entrega acesso amplo à rede interna, você não criou acesso remoto: criou um cabo muito comprido até o problema.</p><p class="ch-p">Os labs de WAN e VPN exploram túneis, rotas, split tunneling, IPSec, WireGuard e SD-WAN. A pergunta boa não é “conectou?”. A pergunta boa é “conectou onde, com qual identidade, por qual rota, com qual privilégio e deixando qual log?”.</p><div class="deep-grid"><div class="deep-card"><strong>Split tunnel</strong><span>Melhora performance, mas exige política; sem controle vira saída invisível.</span></div><div class="deep-card"><strong>Full tunnel</strong><span>Centraliza inspeção, mas cobra capacidade e desenho decente.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> usuário VPN acessa subnet de servidores inteira.<br><span class="bad">risco:</span> credencial comprometida vira movimento lateral premium.<br><span class="ok">correção:</span> acesso por grupo, MFA, postura, ZTNA/ACL e logs úteis.</div>`},
{t:'Operações: documentação é controle de segurança, não castigo',p:`<p class="ch-p">Rede sem documentação é arqueologia. Você escava IP, encontra VLAN, descobre switch, acha rota, consulta planilha de 2021 e reza. Operação madura depende de inventário, IPAM, diagrama, baseline, monitoramento e processo de mudança. Chato? Sim. Necessário? Mais ainda.</p><p class="ch-p">Nos labs de operação, o foco é transformar ruído em visibilidade. SNMP, Syslog, NetFlow, NTP e naming convention reduzem tempo de investigação. Sem isso, o incidente vira reunião com vinte pessoas e nenhuma evidência.</p><div class="deep-grid"><div class="deep-card"><strong>IPAM</strong><span>Evita conflito, acelera investigação e impede que “IP livre” vire lenda urbana.</span></div><div class="deep-card"><strong>Logs</strong><span>Sem horário sincronizado, correlação vira fanfic cronológica.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> firewall, switch e servidor com horários diferentes.<br><span class="bad">impacto:</span> timeline quebrada.<br><span class="ok">correção:</span> NTP confiável e padronização de logs.</div>`},
{t:'Segurança em camadas: uma barreira só é só decoração cara',p:`<p class="ch-p">Firewall é importante. Mas se ele é sua única estratégia, você está basicamente colocando uma porta blindada numa casa sem parede. Segurança em rede combina segmentação, controle de acesso, inspeção, detecção, identidade, logs e resposta.</p><p class="ch-p">Os labs deste capítulo conectam DMZ, IDS/IPS, firewall, ACL e Zero Trust. A pergunta é sempre: o que deve comunicar, por quê, com qual identidade, em qual direção e sob qual visibilidade? “Liberar any any só para testar” é como abrir a jaula para ver se o leão está bravo.</p><div class="deep-grid"><div class="deep-card"><strong>DMZ</strong><span>Publica serviços sem entregar o coração da rede interna numa bandeja.</span></div><div class="deep-card"><strong>Zero Trust</strong><span>Não é produto mágico; é princípio de verificação contínua e menor privilégio.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> servidor web na DMZ acessa banco interno sem restrição fina.<br><span class="bad">impacto:</span> web compromise vira caminho para dados.<br><span class="ok">correção:</span> ACL específica, porta mínima, identidade, logs e monitoramento.</div>`},
{t:'Ataques de rede: o básico ofensivo que defesa precisa reconhecer',p:`<p class="ch-p">Você não precisa ensinar caos ao atacante; ele já vem treinado. Mas precisa reconhecer padrões: spoofing, MITM, scan, DoS, ARP poisoning, DNS abuse, brute force e exploração de serviços. Cada técnica deixa sinais diferentes. O trabalho é enxergar antes de virar manchete interna.</p><p class="ch-p">Nos labs de ataque, não procure “botão de hacker”. Procure indicadores: volume, sequência, destino, porta, repetição, estado TCP, comportamento fora de baseline e relação com topologia. A rede fala. O problema é que muita gente escuta em mudo.</p><div class="deep-grid"><div class="deep-card"><strong>Scan</strong><span>Distribuído, lento ou com RST pode parecer tráfego normal se você só olha volume bruto.</span></div><div class="deep-card"><strong>MITM</strong><span>ARP anômalo, gateway duplicado e certificados estranhos são pistas, não decoração.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> muitos SYN para portas variadas, poucos handshakes completos.<br><span class="bad">chute ruim:</span> “usuário curioso”.<br><span class="ok">análise:</span> varredura TCP ou reconhecimento pré-ataque.</div>`},
{t:'Análise de tráfego: evidência antes de opinião',p:`<p class="ch-p">Analisar tráfego não é abrir ferramenta bonita e esperar que ela confesse o incidente. É formular hipótese, filtrar, validar fluxo, comparar baseline e explicar o que aconteceu. Pacote sem contexto é só fofoca binária.</p><p class="ch-p">Embora exista curso específico de Wireshark, aqui o foco é rede: NetFlow, metadados, Zeek, DNS, conexões, volume e comportamento. Você deve sair sabendo diferenciar lentidão, falha de resolução, bloqueio, scan e comunicação suspeita.</p><div class="deep-grid"><div class="deep-card"><strong>Pacote</strong><span>Mostra detalhe profundo, ótimo para prova pontual.</span></div><div class="deep-card"><strong>Fluxo</strong><span>Mostra padrão e escala, ótimo para caça e operação.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> host faz conexões curtas periódicas para IP raro.<br><span class="bad">chute ruim:</span> “telemetria qualquer”.<br><span class="ok">análise:</span> possível beacon; validar domínio, ASN, metadados, processo e recorrência.</div>`},
{t:'Troubleshooting: método para não virar refém do palpite',p:`<p class="ch-p">Troubleshooting bom é método. Troubleshooting ruim é grupo de WhatsApp com gente culpando DNS, firewall e “a nuvem”. O processo existe para evitar salto lógico: identificar problema, estabelecer teoria, testar, plano de ação, implementar, verificar e documentar.</p><p class="ch-p">O lab final exige que você conecte tudo: camada, IP, rota, porta, DNS, política, evidência e correção. O objetivo não é acertar por instinto. É construir diagnóstico defensável. Em produção, “acho que” não deveria abrir change.</p><div class="deep-grid"><div class="deep-card"><strong>Primeiro passo</strong><span>Defina sintoma, escopo e impacto. Sem isso, você investiga o universo.</span></div><div class="deep-card"><strong>Último passo</strong><span>Documente causa e correção. Memória humana em TI tem TTL curto e alta perda de pacote.</span></div></div><div class="deep-scenario"><span class="warn">cenário:</span> app não acessa banco após mudança de rede.<br><span class="bad">chute ruim:</span> “banco caiu”.<br><span class="ok">método:</span> validar DNS, rota, porta, firewall, retorno, log e change recente.</div>`}
];
const LABALIGN=[
  {
    "t": "Lab orientado — camadas, handshake e evidência mínima",
    "p": "<p class=\"ch-p\">Antes do quiz, execute mentalmente o fluxo abaixo. A pergunta não é “qual camada eu decorei?”, é “onde a evidência mora?”. Rede não é horóscopo: cada sintoma deixa rastro em camada, protocolo, porta ou estado.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Rode <strong>netstat</strong> e identifique serviços em LISTENING. Porta aberta sem contexto é só fofoca de terminal.<br><span class=\"warn\">tarefa 2:</span> Rode <strong>handshake</strong> e compare SYN, SYN-ACK e ACK. Se só aparece SYN, pense em scan, filtro ou SYN flood.<br><span class=\"warn\">tarefa 3:</span> Rode <strong>encap</strong> e localize MAC, IP, porta e payload. O quiz cobra exatamente essa separação.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>MAC na camada 2, IP spoofing na camada 3, TCP/ACK na camada 4 e modelo TCP/IP como visão prática.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Responder por associação vaga: “IP é internet”, “TCP é porta” e outras tragédias de call técnica.</span></div></div>"
  },
  {
    "t": "Lab orientado — subnetting, NAT/PAT e IPv6 sem choro",
    "p": "<p class=\"ch-p\">Use a calculadora do capítulo como se estivesse desenhando uma rede real. Subnetting não é penitência matemática; é contenção de dano. Uma rede plana demais é o equivalente técnico de deixar todas as portas do prédio abertas “porque facilita”.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Calcule <strong>192.168.10.0/26</strong> e anote rede, broadcast e hosts úteis.<br><span class=\"warn\">tarefa 2:</span> Compare <strong>/24</strong>, <strong>/26</strong> e <strong>/30</strong>. Cada prefixo resolve um problema diferente; usar /24 para tudo é preguiça com máscara bonita.<br><span class=\"warn\">tarefa 3:</span> Explique por que PAT usa portas, por que 169.254.x.x denuncia falha de DHCP e por que fe80::/10 não sai roteando feliz pela internet.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>/26, broadcast de /8, PAT, APIPA e IPv6 link-local.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Contar host sem remover rede e broadcast. É clássico, triste e muito evitável.</span></div></div>"
  },
  {
    "t": "Lab orientado — protocolos que fingem ser inocentes",
    "p": "<p class=\"ch-p\">DNS, DHCP, SNMP, NTP e Telnet parecem “básico de infraestrutura”. O problema é que incidente adora básico negligenciado. Protocolo velho, comunidade SNMP pública e DNS barulhento são o trio sertanejo do desastre silencioso.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> No lab, rode os comandos de diagnóstico e identifique o fluxo DORA: Discover, Offer, Request, Ack.<br><span class=\"warn\">tarefa 2:</span> Compare Telnet e SSH. Se a senha passa em claro, não é legado: é pedido formal de incidente.<br><span class=\"warn\">tarefa 3:</span> Procure sinais de DNS tunneling: consultas longas, subdomínios aleatórios e volume fora do padrão.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>DORA, Telnet inseguro, SNMPv3, DNS tunneling e DHCP Snooping.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Achar que porta conhecida significa tráfego legítimo. Malware também sabe usar protocolo bonitinho.</span></div></div>"
  },
  {
    "t": "Lab orientado — switching, VLAN e a camada 2 sem glamour",
    "p": "<p class=\"ch-p\">Switching é onde muita rede corporativa finge segmentação. VLAN mal definida, trunk permissivo e STP negligenciado criam um parque de diversões para lateral movement. A camada 2 não aparece em dashboard bonito, mas aparece no incidente.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Analise a tabela MAC: se muitos MACs aparecem em uma porta, pense em MAC flooding ou loop.<br><span class=\"warn\">tarefa 2:</span> Revise access port versus trunk port. Porta de usuário negociando trunk é quase poesia, só que escrita por um atacante.<br><span class=\"warn\">tarefa 3:</span> Verifique native VLAN e STP. VLAN 1 e STP lento são “sempre foi assim” com consequências.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>CAM table, trunk, native VLAN, STP e LACP.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Achar que VLAN é firewall. VLAN separa domínio; quem controla tráfego é política.</span></div></div>"
  },
  {
    "t": "Lab orientado — roteamento, caminho e mentira operacional",
    "p": "<p class=\"ch-p\">Quando o tráfego não chega, a aplicação vira ré, o firewall vira vilão e o roteamento fica fingindo inocência. O lab deste capítulo força a pergunta certa: qual rota foi escolhida, por qual métrica e com qual retorno?</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Leia a tabela de rotas e identifique a rota mais específica. Longest Prefix Match ganha de palpite.<br><span class=\"warn\">tarefa 2:</span> Compare rota estática, OSPF e rota padrão. O pacote não segue o caminho mais bonito, segue a tabela.<br><span class=\"warn\">tarefa 3:</span> Simule assimetria: ida por um firewall, volta por outro. Stateful inspection ama sofrer nesse cenário.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>Administrative Distance, Longest Prefix Match, Area 0, rota padrão e BGP hijacking.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Olhar só o destino e esquecer o caminho de volta. TCP exige conversa, não monólogo.</span></div></div>"
  },
  {
    "t": "Lab orientado — cabeamento, fibra, PoE e humildade física",
    "p": "<p class=\"ch-p\">A camada física é aquela que humilha especialista com doutorado em firewall. Link intermitente, CRC error, PoE insuficiente e transceiver errado parecem “coisa simples” até derrubarem produção no horário mais caro.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Compare Cat5e, Cat6, Cat6A e fibra para distância e velocidade.<br><span class=\"warn\">tarefa 2:</span> Diante de CRC errors, investigue cabo, conector, interferência, duplex e porta. Não invoque entidade mística antes do patch cord.<br><span class=\"warn\">tarefa 3:</span> Relacione PoE/PoE+ com APs e câmeras. Energia insuficiente gera sintoma “aleatório”, o nome corporativo da falta de método.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>Cat6A, SMF/MMF, PoE+, CRC errors e SFP/SFP+.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Escolher cabo por “parece bom”. Rede não deveria ser administrada por estética de conector.</span></div></div>"
  },
  {
    "t": "Lab orientado — Wi‑Fi, canal, autenticação e caos invisível",
    "p": "<p class=\"ch-p\">Wireless é rede com parede, vizinho, micro-ondas, estacionamento e IoT suspeito no mesmo pacote emocional. O lab exige pensar em espectro, autenticação e isolamento, porque SSID bonito não segura incidente.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Compare canais 2.4 GHz não sobrepostos e entenda por que “deixa automático” nem sempre é plano de engenharia.<br><span class=\"warn\">tarefa 2:</span> Compare WPA2-PSK, WPA3-SAE e 802.1X. Senha compartilhada em empresa é confiança coletiva na sorte.<br><span class=\"warn\">tarefa 3:</span> Analise Evil Twin: SSID parecido, sinal forte e usuário distraído. O pacote perfeito do desastre.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>Canais 1/6/11, WPA3, 802.11ax, Evil Twin e WPA2-Enterprise.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Confundir criptografia forte com arquitetura segura. Guest na rede interna continua sendo guest com crachá falso.</span></div></div>"
  },
  {
    "t": "Lab orientado — WAN, VPN, SD-WAN e confiança remota",
    "p": "<p class=\"ch-p\">VPN conecta. Ela não absolve pecado arquitetural. Se o usuário remoto entra na rede inteira, você não fez acesso seguro; fez um cabo comprido atravessando a internet com crachá de “confia”.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Compare MPLS, VPN e SD-WAN: transporte, criptografia, política e roteamento por aplicação.<br><span class=\"warn\">tarefa 2:</span> Analise split tunneling: melhora tráfego, mas pode escapar de inspeção se a política for teatro.<br><span class=\"warn\">tarefa 3:</span> Compare VPN tradicional e ZTNA. A pergunta madura não é “conectou?”, é “a quê, por quê, com qual postura e qual log?”.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>MPLS sem criptografia nativa, SD-WAN application-aware, PPTP inseguro, ZTNA e split tunneling.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Achar que túnel é sinônimo de segurança. Túnel também transporta problema muito bem.</span></div></div>"
  },
  {
    "t": "Lab orientado — operação, IPAM, baseline e ferramentas",
    "p": "<p class=\"ch-p\">Operação de rede sem documentação é arqueologia com SLA. O lab deste capítulo treina ferramentas e evidências: IPAM, baseline, traceroute, iperf e change log. Sem isso, cada incidente vira sessão espírita com roteador.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Rode comandos de diagnóstico e separe conectividade, resolução de nome, caminho e performance.<br><span class=\"warn\">tarefa 2:</span> Defina baseline: tráfego normal, latência esperada, rotas usuais e volumetria. Sem normal, não existe anormal; existe susto.<br><span class=\"warn\">tarefa 3:</span> Monte um change log mínimo: quem, quando, o que mudou, motivo, rollback e evidência.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>IPAM, baseline, traceroute, iperf3 e change log.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>“Foi só uma alteração pequena”. Frase famosa antes de um incidente grande.</span></div></div>"
  },
  {
    "t": "Lab orientado — firewall, IDS/IPS, DMZ e Zero Trust",
    "p": "<p class=\"ch-p\">Segurança em camadas não é empilhar appliance até a sala do rack virar vitrine. É criar controle coerente: segmentação, inspeção, registro, hardening e validação contínua. O lab pede raciocínio de arquitetura, não fé no vendor.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Compare IDS e IPS: detectar versus bloquear. Um grita, o outro mete a mão. Ambos precisam contexto.<br><span class=\"warn\">tarefa 2:</span> Desenhe DMZ: serviço exposto não deve abraçar banco interno sem política.<br><span class=\"warn\">tarefa 3:</span> Aplique Zero Trust: identidade, dispositivo, contexto, menor privilégio e verificação contínua. “Está na rede interna” não é argumento, é trauma legado.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>IDS/IPS, NGFW, DMZ, Zero Trust e hardening.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Achar que firewall default deny resolve arquitetura ruim. Ele ajuda; não faz milagre com planilha bagunçada.</span></div></div>"
  },
  {
    "t": "Lab orientado — ataques de rede com foco defensivo",
    "p": "<p class=\"ch-p\">Este capítulo não ensina a “fazer bagunça”; ensina a reconhecer o cheiro técnico da bagunça. Ataque de rede deixa padrão: volume, assimetria, spoofing, sessão incompleta, AP falso, ARP suspeito ou consumo lento de recurso.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> No lab de reconhecimento, compare scan SYN, conexão completa e ruído de porta fechada.<br><span class=\"warn\">tarefa 2:</span> Diferencie DoS volumétrico de ataque low-and-slow como Slowloris. Um derruba na pancada, o outro na paciência irritante.<br><span class=\"warn\">tarefa 3:</span> Relacione ARP Poisoning, Rogue AP e DNS Amplification com mitigação adequada.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>Slowloris, DNS amplification, Rogue AP, ARP Poisoning e SYN scan.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Responder “bloqueia no firewall” para tudo. Isso é menos estratégia e mais reflexo nervoso.</span></div></div>"
  },
  {
    "t": "Lab orientado — evidência de rede sem virar curso de ferramenta",
    "p": "<p class=\"ch-p\">Aqui o foco não é ferramenta específica; é evidência. Pacote, fluxo, beacon, SYN puro, User-Agent estranho e telemetria agregada contam histórias. Ferramenta muda; o raciocínio fica. Pelo menos deveria.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Identifique SYN puro: tentativa de conexão sem ACK final pode indicar scan.<br><span class=\"warn\">tarefa 2:</span> Compare PCAP e NetFlow: pacote é microscópio, fluxo é mapa. Usar um no lugar do outro dá aquela falsa sensação de competência.<br><span class=\"warn\">tarefa 3:</span> Analise beaconing: intervalo regular, destino incomum e padrão repetitivo. Malware adora rotina, infelizmente.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>Filtro para SYN puro, beaconing, NetFlow, Zeek e User-Agent anacrônico.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Ver User-Agent antigo e chamar de “compatibilidade”. Em 2026, MSIE 6 é mais evidência do que nostalgia.</span></div></div>"
  },
  {
    "t": "Lab orientado — troubleshooting com método, não com vela",
    "p": "<p class=\"ch-p\">Troubleshooting bom começa com escopo. Troubleshooting ruim começa reiniciando coisa aleatória e esperando a rede se sentir culpada. O lab final amarra tudo: sintoma, hipótese, teste, correção, validação e documentação.</p><div class=\"deep-scenario\"><span class=\"warn\">tarefa 1:</span> Defina o problema: quem é afetado, desde quando, em qual rede, em qual serviço e após qual mudança.<br><span class=\"warn\">tarefa 2:</span> Teste em ordem: IP, gateway, rota, DNS, porta, firewall, aplicação e retorno.<br><span class=\"warn\">tarefa 3:</span> Quando uma teoria falhar, crie nova hipótese. Não case com hipótese ruim; ela não vai mudar por amor.</div><div class=\"deep-grid\"><div class=\"deep-card\"><strong>O quiz cobra</strong><span>Primeiro passo, APIPA, falha de DNS, teoria refutada e CRC errors.</span></div><div class=\"deep-card\"><strong>Erro que reprova</strong><span>Pular documentação final. Incidente sem registro volta disfarçado e ainda te chama pelo nome.</span></div></div>"
  }
];
function addDeepDivePages(cv,idx){
  const d=DEEP[idx];
  const l=LABALIGN[idx];
  const pages=[...cv.querySelectorAll('.pdf-page')];
  const quizPage=pages.find(p=>p.textContent.includes('Quiz'));
  if(d){
    const page=mkPage(`Cap.${idx+1} · Didática aplicada`,'+',`<h2 class="ch-h2">${d.t}</h2>${d.p}<div class="deep-note"><b>Ligação com o quiz:</b> as questões deste capítulo usam o conteúdo e o lab como base. Não responda como quem decorou flashcard; responda como quem precisa explicar o incidente sem passar vergonha na call.</div>`);
    if(quizPage) cv.insertBefore(page,quizPage); else cv.appendChild(page);
  }
  if(l){
    const page2=mkPage(`Cap.${idx+1} · Lab guiado`,'LAB',`<h2 class="ch-h2">${l.t}</h2>${l.p}<div class="deep-note"><b>Checklist antes do quiz:</b> responda só depois de conseguir explicar o cenário do lab em voz alta. Se a explicação sair como “porque sim”, ainda não é análise; é superstição com teclado.</div>`);
    const pages2=[...cv.querySelectorAll('.pdf-page')];
    const quizPage2=pages2.find(p=>p.textContent.includes('Quiz'));
    if(quizPage2) cv.insertBefore(page2,quizPage2); else cv.appendChild(page2);
  }
}


/* ══ NAVIGATION ══ */
function renderNav(){
  const nav=document.getElementById('sb-nav');if(!nav)return;
  const tot=CHS.length,pct=Math.round(ST.done.length/tot*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  let html='',lastDom=0;
  CHS.forEach(ch=>{
    if(ch.dom!==lastDom){html+=`<div class="sb-sec">${DN[ch.dom]} · ${DW[ch.dom]}</div>`;lastDom=ch.dom;}
    const done=ST.done.includes(ch.id),act=ST.cur===ch.id;
    const lock=ch.id>0&&!ST.done.includes(ch.id-1)&&!done&&!act;
    html+=`<div class="nav-item ${done?'done':''} ${act?'active':''} ${lock?'locked':''}" onclick="${lock?'':'`goTo('+ch.id+')`'}">
      <div class="n-num">${done?'✓':ch.id+1}</div>
      <div class="n-title">${ch.title}</div>
      ${lock?'<span class="n-lock">🔒</span>':done?'<span class="n-chk">★</span>':''}
    </div>`;
  });
  if(ST.done.length===tot){html+=`<div class="sb-sec">Conclusão</div><div class="nav-item ${ST.cur===99?'active':''} done" onclick="showCert()"><div class="n-num">🏆</div><div class="n-title">Certificado</div><span class="n-chk">★</span></div>`;}
  nav.innerHTML=html;
}
function goTo(idx){
  if(idx>0 && !ST.done.includes(idx-1)){alert('Capítulo bloqueado. Conclua o capítulo anterior primeiro. Rede sem ordem vira broadcast de desespero.');return;}
  ST.cur=idx;
  document.getElementById('welcome-view').style.display='none';
  document.getElementById('cert-view').style.display='none';
  const cv=document.getElementById('ch-view');cv.style.display='flex';cv.innerHTML='';
  const nb=document.createElement('div');nb.className='ch-nav';
  const pL=idx>0?CHS[idx-1].title.substring(0,20)+'…':'Início';
  const nL=idx<CHS.length-1?CHS[idx+1].title.substring(0,20)+'…':'Certificado';
  const canNext=idx<CHS.length-1?ST.done.includes(idx):ST.done.length===CHS.length;
  nb.innerHTML=`<button class="nav-btn sec" onclick="${idx>0?`goTo(${idx-1})`:'showWelcome()'}">← ${pL}</button>
  <span style="font-size:11px;color:#7a3050">${idx+1}/${CHS.length}</span>
  <button class="nav-btn pri ${canNext?'':'locked-next'}" onclick="${canNext?(idx<CHS.length-1?`goTo(${idx+1})`:'showCert()'):`alert('Finalize o quiz deste capítulo para desbloquear o próximo. Sim, é proposital.')`}"> ${nL} →</button>`;
  cv.appendChild(nb);
  CHS[idx].fn(cv);
  addDeepDivePages(cv,idx);
  renderNav();cv.parentElement.scrollTo(0,0);
}
function showWelcome(){ST.cur=-1;document.getElementById('welcome-view').style.display='flex';document.getElementById('ch-view').style.display='none';document.getElementById('cert-view').style.display='none';renderNav();document.getElementById('main').scrollTo(0,0);}

  if(ST.done.length<CHS.length){alert('Complete todos os capítulos primeiro!');return;}

  document.getElementById('welcome-view').style.display='none';document.getElementById('ch-view').style.display='none';

}
function buildCert(con){
  con.innerHTML='';
  const d=new Date(),ds=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const cid='MBS-'+Math.random().toString(36).substring(2,7).toUpperCase()+'-NET-2026';
  const w=document.createElement('div');w.className='cert-wrap';
  w.dataset.cid=cid;w.dataset.date=ds;
  w.innerHTML=`<div class="cert-corner tl"></div><div class="cert-corner tr"></div><div class="cert-corner bl"></div><div class="cert-corner br"></div>
<div class="cert-top"><div class="cert-issuer">Mariana BS - 2026</div><div class="cert-course">Fundamentos de Redes para Cibersegurança</div></div>
<div class="cert-body">
  <div class="cert-pres">Certificado concedido a</div>
  <input class="cert-inp" id="cert-name" placeholder="Seu nome completo" onclick="this.select()">
  <div class="cert-desc">por concluir com êxito o curso <strong>Fundamentos de Redes para Cibersegurança</strong>, com carga horária de <strong>12 horas</strong>, incluindo conteúdo técnico, labs práticos interativos e avaliações aprovadas.</div>
  <div class="cert-sigs">
    <div class="cert-sig"><div class="cert-sig-line">Mariana BS</div><div class="cert-sig-lbl">Instrutora</div></div>
    <div style="text-align:center"><div style="font-size:32px">🛡</div><div style="font-size:9px;color:var(--gold);letter-spacing:.06em">REDES 2026</div></div>
    <div class="cert-sig"><div class="cert-sig-line">12 horas</div><div class="cert-sig-lbl">Carga horária</div></div>
  </div>
</div>
<div class="cert-bot"><span class="cert-id">ID: ${cid}</span><span class="cert-date">${ds}</span></div>`;
  con.appendChild(w);
  const btn=document.createElement('button');btn.className='print-btn';btn.innerHTML='⬇ Baixar certificado em PNG';btn.onclick=()=>downloadCertPNG(cid,ds);con.appendChild(btn);
}
function drawCenteredText(ctx,text,x,y,maxWidth,lineHeight){
  const words=String(text).split(' ');let line='',lines=[];
  for(const word of words){const test=line?line+' '+word:word;if(ctx.measureText(test).width>maxWidth&&line){lines.push(line);line=word;}else{line=test;}}
  if(line)lines.push(line);
  lines.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lineHeight));
  return y+lines.length*lineHeight;
}
function downloadCertPNG(cid,ds){
  const nameEl=document.getElementById('cert-name');
  const person=(nameEl?.value||'Seu nome completo').trim();
  const W=1600,H=1100;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fefaf6';ctx.fillRect(0,0,W,H);
  const grad=ctx.createLinearGradient(0,0,W,0);grad.addColorStop(0,'#2a0e1c');grad.addColorStop(1,'#180810');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,190);ctx.fillRect(0,H-120,W,120);
  ctx.strokeStyle='#c9913d';ctx.lineWidth=8;ctx.strokeRect(42,42,W-84,H-84);
  ctx.lineWidth=2;ctx.strokeRect(72,72,W-144,H-144);
  ctx.fillStyle='#e8b86d';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='700 34px Georgia, serif';ctx.fillText('Mariana BS - 2026',W/2,70);
  ctx.font='italic 48px Georgia, serif';ctx.fillText('Fundamentos de Redes para Cibersegurança',W/2,135);
  ctx.fillStyle='#3d1e10';ctx.font='700 26px Arial, sans-serif';ctx.fillText('Certificado concedido a',W/2,285);
  ctx.fillStyle='#1a0a06';ctx.font='700 62px Georgia, serif';ctx.fillText(person,W/2,375);
  ctx.strokeStyle='#c9913d';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(390,425);ctx.lineTo(W-390,425);ctx.stroke();
  ctx.fillStyle='#3d1e10';ctx.font='30px Arial, sans-serif';
  let y=505;
  y=drawCenteredText(ctx,'por concluir com êxito o curso Fundamentos de Redes para Cibersegurança, com carga horária de 12 horas, incluindo conteúdo técnico, labs práticos interativos e avaliações aprovadas.',W/2,y,1080,42)+18;
  ctx.fillStyle='#9e3352';ctx.font='700 28px Arial, sans-serif';ctx.fillText('Carga horária: 12 horas',W/2,y+18);
  ctx.fillStyle='#1a0a06';ctx.font='italic 42px Georgia, serif';ctx.fillText('Mariana BS',430,835);
  ctx.strokeStyle='#d4b896';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(260,875);ctx.lineTo(600,875);ctx.stroke();
  ctx.fillStyle='#6b3a20';ctx.font='700 20px Arial, sans-serif';ctx.fillText('Instrutora',430,910);
  ctx.fillStyle='#1a0a06';ctx.font='700 36px Georgia, serif';ctx.fillText('12 horas',W-430,835);
  ctx.strokeStyle='#d4b896';ctx.beginPath();ctx.moveTo(W-600,875);ctx.lineTo(W-260,875);ctx.stroke();
  ctx.fillStyle='#6b3a20';ctx.font='700 20px Arial, sans-serif';ctx.fillText('Carga horária',W-430,910);
  ctx.fillStyle='#f0c8d2';ctx.font='700 22px monospace';ctx.textAlign='left';ctx.fillText('ID: '+cid,90,H-60);
  ctx.textAlign='right';ctx.fillStyle='#e8b86d';ctx.font='700 22px Arial, sans-serif';ctx.fillText(ds,W-90,H-60);
  const a=document.createElement('a');
  a.download='certificado-redes-ciberseguranca.png';
  a.href=c.toDataURL('image/png');
